<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แดชบอร์ด รีเบทแต่ละกลุ่ม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --surface:   #f8f9fa;
  --surface2:  #f0f1f3;
  --border:    #e2e5e9;
  --accent:    #e07b1e;
  --accent2:   #2563eb;
  --green:     #16a34a;
  --red:       #dc2626;
  --yellow:    #d97706;
  --text:      #111827;
  --muted:     #6b7280;
  --rebate:    #16a34a;
  --font:      'Sarabun', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --radius:    10px;
  --c65: #6366f1;
  --c66: #0ea5e9;
  --c67: #10b981;
  --c68: #e07b1e;
  --c69: #d97706;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.brand { font-size: 15px; font-weight: 700; letter-spacing: .5px; color: var(--accent); }
.brand span { color: var(--text); font-weight: 300; }
.brand-switcher { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.brand-pill {
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: none; border: 2px solid var(--border);
  border-radius: 20px; padding: 4px 11px; cursor: pointer;
  font-family: var(--font); color: var(--muted);
  transition: all .2s; white-space: nowrap;
}
.brand-pill span { font-weight: 300; }
.brand-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(224,123,30,.07); }
.brand-pill#brandCROC.active { border-color: #0ea5e9; color: #0ea5e9; background: rgba(14,165,233,.07); }
.brand-pill#brandSIKA.active { border-color: #e11d48; color: #e11d48; background: rgba(225,29,72,.07); }
.brand-pill:hover:not(.active) { border-color: #aaa; color: var(--text); }
.nav-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  white-space: nowrap; background: none; border: none;
  color: var(--muted); font-family: var(--font);
  font-size: 13px; font-weight: 600;
  padding: 6px 12px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active, .tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { color: var(--accent); }
.data-btn {
  white-space: nowrap;
  background: linear-gradient(135deg, #16a34a, #15803d);
  border: none;
  color: #fff;
  font-family: var(--font);
  font-size: 12px; font-weight: 700;
  padding: 5px 11px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  letter-spacing: .3px;
  box-shadow: 0 1px 4px rgba(22,163,74,.35);
  flex-shrink: 0;
}
.data-btn:hover { background: linear-gradient(135deg, #15803d, #166534); box-shadow: 0 2px 8px rgba(22,163,74,.45); transform: translateY(-1px); }
.data-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.nav-right { display: flex; align-items: center; gap: 6px; }

main { padding: 16px; max-width: 900px; margin: 0 auto; }
.page { display: none; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }

.section-title {
  font-size: 12px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin: 22px 0 11px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 11px;
  transition: border-color .2s, box-shadow .2s;
}
.stat-card:hover { border-color: var(--accent2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.stat-card .year-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 1px; margin-bottom: 5px; }
.stat-card .value { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
.stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.stat-card .badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-top: 5px; }
.badge.up   { background: rgba(22,163,74,.12); color: var(--green); }
.badge.down { background: rgba(220,38,38,.10); color: var(--red); }
.stat-card.highlight { border-color: var(--accent); }
.stat-card.highlight .value { color: var(--accent); }

/* ── BAR CHART ── */
.chart-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px 10px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.chart-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); font-weight: 600; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 260px;
  min-width: 260px;
  padding-top: 20px;
}.bar {
  width: 100%;
  max-width: 50px;
}
.bar-group { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; flex: 1; height: 100%;}
.bar {
  width: 100%; border-radius: 5px 5px 0 0;
  transition: height .6s cubic-bezier(.4,0,.2,1), opacity .2s;
  min-height: 4px; cursor: pointer;
  position: relative;
}
.bar:hover { opacity: 0.82; }
.bar:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1f2937; border: 1px solid #374151;
  color: #fff; font-size: 11px; padding: 4px 8px;
  border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 10;
}
.bar-label { font-size: 11px; color: var(--muted); text-align: center; font-weight: 600; }
.bar-val   { font-size: 10px; color: var(--muted); font-family: var(--mono); }

/* ── TABLE ── */
.tbl-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: auto; margin-bottom: 16px;
}
table { width: 100%; border-collapse: collapse; min-width: 340px; }
thead th {
  background: var(--surface2);
  color: var(--muted); font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  padding: 9px 11px; text-align: right; white-space: nowrap;
  border-bottom: 1.5px solid var(--border);
}
thead th:first-child { text-align: left; position: sticky; left: 0; background: var(--surface2); }
tbody td {
  padding: 8px 11px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 12px; text-align: right; white-space: nowrap;
}
tbody td:first-child {
  text-align: left; font-family: var(--font); font-size: 13px;
  position: sticky; left: 0; background: var(--surface);
  border-right: 1px solid var(--border);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: rgba(0,0,0,.02); }
tbody tr:nth-child(even) td:first-child { background: rgba(0,0,0,.02); }
tbody tr.total-row td { background: var(--surface2) !important; font-weight: 700; color: var(--accent); }
.pct.pos { color: var(--green); }
.pct.neg { color: var(--red); }
.pct.neutral { color: var(--muted); }
.yr2569 { color: var(--yellow) !important; font-weight: 600; }
.highlight-cell { color: var(--accent) !important; font-weight: 700; }

/* ── REBATE ── */
.rebate-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media (min-width: 480px) { .rebate-summary { grid-template-columns: repeat(4,1fr); } }
.rebate-item {
  background: var(--surface); border: 1.5px solid rgba(22,163,74,.4);
  border-radius: var(--radius); padding: 12px;
}
.rebate-item .r-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
.rebate-item .r-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--rebate); }
.rebate-item .r-pct { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── NOTE ── */
.note {
  background: rgba(217,119,6,.07); border: 1px solid rgba(217,119,6,.3);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 12px; color: var(--yellow); margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 8px;
}
.note::before { content: '⚠'; flex-shrink: 0; margin-top: 1px; }

.page-title { font-size: 19px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
.page-sub   { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

footer {
  text-align: center; padding: 20px 16px;
  font-size: 11px; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 28px;
}

/* ── PRODUCT TABLE (page 2) ── */
.prod-tbl-wrap {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: auto; margin-bottom: 16px;
}
.prod-tbl-wrap table { min-width: 480px; }
.prod-name-cell { font-size: 12px !important; font-family: var(--font) !important; max-width: 160px; white-space: normal !important; line-height: 1.3; }

/* ── N-month mini-cards row on page 1 ── */
.four-month-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px; margin-bottom: 16px;
}
.fm-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 10px 9px; text-align: center;
}
.fm-card .fm-year { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: .8px; margin-bottom: 4px; }
.fm-card .fm-val  { font-family: var(--mono); font-size: 13px; font-weight: 700; }
.fm-card .fm-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 20px; display: inline-block; margin-top: 4px; }

@media (max-width: 480px) {
  .topbar { height: 48px; }
  .brand { font-size: 13px; }
  .tab-btn { font-size: 12px; padding: 5px 9px; }
  main { padding: 10px; }
  .stat-grid { grid-template-columns: repeat(2,1fr); gap: 7px; }
  .stat-card .value { font-size: 14px; }
  .page-title { font-size: 16px; }
  .bar-chart { height: 95px; }
  .four-month-strip { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand-switcher">
    <button class="brand-pill active" id="brandQC" onclick="switchBrand('qc')">ควิก<span>โค้ท</span></button>
    <button class="brand-pill" id="brandCROC" onclick="switchBrand('croc')">จระ<span>เข้</span></button>
    <button class="brand-pill" id="brandSIKA" onclick="switchBrand('sika')">ซิก้า<span>/แลงโก้</span></button>
  </div>
  <nav class="nav-tabs" id="navTabs"></nav>
</div>
<div id="dataBanner" style="background:linear-gradient(90deg,#dcfce7,#bbf7d0); border-bottom:2px solid #86efac; padding:8px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;">
  <span id="bannerLabel" style="font-size:12px; color:#15803d; font-weight:600;">📊 ดูข้อมูลดิบ สินค้าควิกโค้ทใน Google Sheets</span>
  <a id="bannerLink" href="https://docs.google.com/spreadsheets/d/1aKR6KmUGosext5SE1d92VF-CVEHeCJEFfM_IvHE6gzY/edit?gid=246191077#gid=246191077" target="_blank" rel="noopener" style="background:#16a34a;color:#fff;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:0 1px 4px rgba(22,163,74,.4)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    เปิด Google Sheet
  </a>
</div>
<main id="mainContent"></main>
<footer id="footerEl">ข้อมูล ณ เดือนเม.ย. 2569 &nbsp;|&nbsp; หน่วย: บาท (ไม่รวม VAT)</footer>

<script>

// ══════════════════════════════════════════════
// ── SHARED HELPERS ──
// ══════════════════════════════════════════════
const YEARS = [2565,2566,2567,2568,2569];
const MN = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YR_COL = {2565:'#6366f1',2566:'#0ea5e9',2567:'#10b981',2568:'#e07b1e',2569:'#d97706'};

const fmt  = (n) => (n && n!==0) ? n.toLocaleString('th-TH',{maximumFractionDigits:0}) : '–';
const fmtM = (n) => {
  if(!n) return '–';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n.toLocaleString('th-TH',{maximumFractionDigits:0});
};
const pctStr = (a,b) => {
  if(!a) return '<span class="pct neutral">–</span>';
  const p = ((b-a)/a)*100;
  const cls = p>0?'pos':'neg';
  return `<span class="pct ${cls}">${p>0?'+':''}${p.toFixed(1)}%</span>`;
};
const pChange = (a,b) => a ? ((b-a)/a) : null;

// ── getLastMonth: นับเดือนสุดท้ายที่มียอด จาก data object ──
// รองรับทั้ง key เป็น string '2569' และ number 2569
function getLastMonth(dataObj) {
  if (!dataObj) return 4;
  const mTot = dataObj.monthlyTotals;
  if (!mTot) return 4;
  const arr = mTot['2569'] || mTot[2569] || [];
  const last = arr.reduce((acc, v, i) => (v && v > 0 ? i + 1 : acc), 0);
  return last || 4;
}

// ── nmLabel: แปลงจำนวนเดือนเป็น label ──
function nmLabel(nm) {
  return `ม.ค.–${MN[nm-1]}`;
}

// ── updateFooter: อัปเดต footer ตามเดือนล่าสุด ──
function updateFooter(nm) {
  const el = document.getElementById('footerEl');
  if (el) el.innerHTML = `ข้อมูล ณ เดือน${MN[nm-1]} 2569 &nbsp;|&nbsp; หน่วย: บาท (ไม่รวม VAT)`;
}

// ══════════════════════════════════════════════
// ── QUICKCOAT DATA ──
// ══════════════════════════════════════════════
const QC_SHEET_ID = '1aKR6KmUGosext5SE1d92VF-CVEHeCJEFfM_IvHE6gzY';
const QC_API = `https://docs.google.com/spreadsheets/d/${QC_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=สรุปดูง่าย`;

let qcDataLive = null;
let qcLoading = false;

function parseQCCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  });

  const YEARS_Q = ['2565','2566','2567','2568','2569'];
  const BAG_COLS  = [1, 3, 5, 7, 9];
  const SALE_COLS = [2, 4, 6, 8, 10];

  const products = [];
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    const a = (row[0]||'').trim();
    const b = (row[1]||'').trim();
    if (b.includes('จำนวน')) {
      const unit = b.replace('จำนวน','').trim();
      const name = a;
      const monthly = {}, bags = {};
      YEARS_Q.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      for (let m = 0; m < 12; m++) {
        const dr = rows[i + 1 + m];
        if (!dr || !dr[0] || !dr[0].includes('เดือน')) break;
        YEARS_Q.forEach((y, yi) => {
          const bv = parseFloat((dr[BAG_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          const sv = parseFloat((dr[SALE_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          bags[y][m] = bv;
          monthly[y][m] = sv;
        });
      }
      products.push({ name, unit, monthly, bags });
      i += 14;
      continue;
    }
    i++;
  }

  const monthlyTotals = {}, yearlyTotals = {};
  YEARS_Q.forEach(y => { monthlyTotals[y] = new Array(12).fill(0); });
  products.forEach(p => {
    YEARS_Q.forEach(y => {
      p.monthly[y].forEach((v, m) => { monthlyTotals[y][m] += v; });
    });
  });
  YEARS_Q.forEach(y => { yearlyTotals[y] = monthlyTotals[y].reduce((a,b) => a+b, 0); });

  const last69 = monthlyTotals['2569'].reduce((last, v, m) => v > 0 ? m+1 : last, 0);

  return { products, monthlyTotals, yearlyTotals, lastMonth2569: last69 };
}

function buildQCFromEmbed() {
  const YEARS_Q = ['2565','2566','2567','2568','2569'];
  const mTot = {};
  YEARS_Q.forEach(y => { mTot[y] = new Array(12).fill(0); });
  YEARS_Q.forEach(y => {
    qcMonthlyTotals[Number(y)].forEach((v,m) => { mTot[y][m] = v; });
  });
  const yTot = {};
  YEARS_Q.forEach(y => { yTot[y] = qcYearlyTotals[Number(y)] || 0; });
  const last69 = mTot['2569'].reduce((last, v, m) => v > 0 ? m+1 : last, 0);
  const prods = qcProducts.map(p => ({
    name: p.name, unit: 'ถุง',
    monthly: Object.fromEntries(YEARS_Q.map(y => [y, p.monthly[Number(y)]])),
    bags: Object.fromEntries(YEARS_Q.map(y => [y, p.bags[Number(y)]]))
  }));
  return { products: prods, monthlyTotals: mTot, yearlyTotals: yTot, lastMonth2569: last69 };
}

function loadQCData() {
  if (qcDataLive || qcLoading) return;
  qcLoading = true;
  const fallback = (reason) => {
    console.warn('[QC] fallback เพราะ:', reason);
    qcLoading = false;
    qcDataLive = buildQCFromEmbed();
    setFetchBadge('qc', 'embed');
    reRenderAll('qc');
  };
  fetch(QC_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseQCCSV(csv);
        if (!data.products || data.products.length < 3) throw new Error('parse failed: products=' + (data.products||[]).length);
        qcLoading = false;
        qcDataLive = data;
        console.log('[QC] live fetch สำเร็จ lastMonth=', data.lastMonth2569, 'products=', data.products.length);
        setFetchBadge('qc', 'live', data.lastMonth2569);
        reRenderAll('qc');
      } catch(e) { fallback(e.message); }
    })
    .catch(e => fallback(e.message));
}

// ── Hardcoded QC embed data ──
const qcMonthlyTotals = {
  2565:[703500,625593,863409,614327,515879,739565,644794,663112,425047,566514,604533,543785],
  2566:[566617,558166,977196,591037,764234,1045746,953428,975150,949402,940318,799625,848979],
  2567:[723411,1122234,1100079,1010138,796879,745794,1056028,714654,801964,818682,721019,564056],
  2568:[906022,502019,1210079,897671,857208,1495712,872465,836232,937942,1291463,954669,1072340],

function buildPage1() {
  if (!qcDataLive) qcDataLive = buildQCFromEmbed();
  const NM = getLastMonth(qcDataLive);
  const mTot = qcDataLive.monthlyTotals;
  const yTot = qcDataLive.yearlyTotals;
  const lastY = 2569;

  // คำนวณ yearlyTotals ปี 2569 จาก live data (NM เดือน)
  const y69live = (mTot['2569']||mTot[2569]||[]).reduce((a,b)=>a+b,0);

  const yearCards = YEARS.map(y => {
    const rawV = yTot[String(y)] || yTot[y] || 0;
    const v = (y === lastY) ? y69live : rawV;
    const prevV = (y-1 === lastY) ? y69live : (yTot[String(y-1)] || yTot[y-1] || 0);
    const chg = prevV ? pChange(prevV, v) : null;
    const col = YR_COL[y];
    const badge = (y === lastY)
      ? `<span class="badge" style="background:rgba(217,119,6,.12);color:#d97706">${NM} เดือน</span>`
      : (chg !== null ? `<span class="badge ${chg>=0?'up':'down'}">${chg>=0?'+':''}${(chg*100).toFixed(1)}%</span>` : '');
    return `<div class="stat-card" style="${y===2568?'border-color:'+col:''}">
      <div class="year-label" style="color:${col}">ปี ${y}</div>
      <div class="value" style="color:${col}">${fmtM(v)}</div>
      <div class="sub">บาท</div>
      ${badge}
    </div>`;
  }).join('');

  const legend = YEARS.map(y=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${YR_COL[y]}"></div>
      <span>ปี ${y}${y===lastY?` (${NM} เดือน)`:''}</span>
    </div>`).join('');

  const yBarData = YEARS.map(y => y===lastY ? y69live : (yTot[String(y)]||yTot[y]||0));
  const yBarMax = Math.max(...yBarData);
  const yBars = yBarData.map((v,i)=>{
    const h = Math.max(3, Math.round((v/yBarMax)*100));
    const y = YEARS[i];
    const col = YR_COL[y];
    const note = y===lastY ? ` (${NM} เดือน)` : '';
    return `<div class="bar-group">
      <div class="bar" style="height:${h}%;background:${col}" data-tip="ปี ${y}: ${fmtM(v)}${note}"></div>
      <div class="bar-label" style="color:${col}">'${String(y).slice(2)}</div>
      <div class="bar-val">${fmtM(v)}</div>
    </div>`;
  }).join('');

  // NM-month strip — เปรียบเทียบทุกปี
  const fNM = y => (mTot[String(y)]||mTot[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0);
  const fN = {}; YEARS.forEach(y => fN[y] = fNM(y));
  const fmStrip = YEARS.map(y=>{
    const v = fN[y]; const prev = fN[y-1];
    const chg = prev ? pChange(prev,v) : null;
    const col = YR_COL[y];
    const badge = chg !== null
      ? `<span class="fm-badge ${chg>=0?'up':'down'}">${chg>=0?'+':''}${(chg*100).toFixed(1)}%</span>`
      : '';
    return `<div class="fm-card" style="${y===lastY?'border-color:'+col:''}">
      <div class="fm-year" style="color:${col}">ปี ${y}</div>
      <div class="fm-val" style="color:${col}">${fmtM(v)}</div>
      ${badge}
    </div>`;
  }).join('');

  // ไตรมาส — ใช้ hardcode แต่ Q ปี 2569 คำนวณจาก live
  const qTot = {};
  YEARS.forEach(y => {
    if (y === lastY) {
      // คำนวณ Q จาก live monthly
      const m = mTot[String(y)] || mTot[y] || Array(12).fill(0);
      qTot[y] = [0,1,2,3].map(q => m.slice(q*3,(q+1)*3).reduce((a,b)=>a+b,0));
    } else {
      qTot[y] = qcQuarterlyTotals[y] || [0,0,0,0];
    }
  });
  let qRows = '';
  for(let q=0;q<4;q++){
    const cells = YEARS.map(y=>{
      const v = qTot[y][q] || 0;
      const isSkip = y===lastY && (q*3) >= NM;
      const isCur  = y===lastY && !isSkip;
      return `<td class="${isCur?'yr2569':''}">${isSkip?'–':fmtM(v)}</td>`;
    }).join('');
    const c68 = qTot[2568][q] || 0;
    const c69val = qTot[lastY][q] || 0;
    const isSkip69 = (q*3) >= NM;
    const chgCol = !isSkip69 ? `<td>${pctStr(c68,c69val)}</td>` : `<td><span class="pct neutral">–</span></td>`;
    qRows += `<tr><td>Q${q+1}</td>${cells}${chgCol}</tr>`;
  }
  const yCellsQ = YEARS.map(y => {
    const total = y===lastY ? y69live : (yTot[String(y)]||yTot[y]||0);
    return `<td class="highlight-cell">${fmtM(total)}</td>`;
  }).join('');
  qRows += `<tr class="total-row"><td>รวม</td>${yCellsQ}<td>–</td></tr>`;

  // ตารางรายเดือน — แสดงทุกเดือน ปี 2569 แสดงถ้ามีข้อมูล
  let mRows = '';
  for(let m=0;m<12;m++){
    const cells = YEARS.map(y=>{
      const arr = mTot[String(y)] || mTot[y] || Array(12).fill(0);
      const v = arr[m] || 0;
      const skip = y===lastY && m >= NM;
      return `<td class="${y===lastY&&m<NM?'yr2569':''}">${skip?'–':fmtM(v)}</td>`;
    }).join('');
    const arr68 = mTot['2568']||mTot[2568]||Array(12).fill(0);
    const arr69 = mTot['2569']||mTot[2569]||Array(12).fill(0);
    const v68 = arr68[m]||0, v69 = arr69[m]||0;
    const chg69 = m<NM ? pctStr(v68,v69) : '<span class="pct neutral">–</span>';
    mRows+=`<tr><td>${MN[m]}</td>${cells}<td>${chg69}</td></tr>`;
  }
  const mTotCells = YEARS.map(y => {
    const total = y===lastY ? y69live : (yTot[String(y)]||yTot[y]||0);
    return `<td>${fmtM(total)}</td>`;
  }).join('');
  mRows+=`<tr class="total-row"><td>รวม</td>${mTotCells}<td>–</td></tr>`;

  const rebateItems = [
    {label:'รีเบทปี 2567', val:qcRebateSummary[2567].total, pct:qcRebateSummary[2567].pct},
    {label:'รีเบทปี 2568', val:qcRebateSummary[2568].total, pct:qcRebateSummary[2568].pct},
    {label:'รีเบท 2569 ที่คาดว่าทำได้จริง', val:qcRebateSummary['2569_current'], pct:null},
    {label:'รีเบท 2569 (ที่กำลังขอพิจารณา)', val:qcRebateSummary['2569_proposed'], pct:null},
  ];
  const rebCards = rebateItems.map(ri=>`
    <div class="rebate-item">
      <div class="r-label">${ri.label}</div>
      <div class="r-val">${fmtM(ri.val)}</div>
      ${ri.pct?`<div class="r-pct">${ri.pct.toFixed(2)}% ของยอดซื้อ</div>`:''}
    </div>`).join('');

  return `
  <div class="page-title">แดชบอร์ด ควิกโค้ท</div>
  <div class="page-sub">ยอดซื้อรวมทุกรายการ ปี 2565–2569</div>

  <div class="section-title">ยอดรวมรายปี</div>
  <div class="stat-grid">${yearCards}</div>

  <div class="section-title">ยอดซื้อ ${nmLabel(NM)} เทียบทุกปี</div>
  <div class="four-month-strip">${fmStrip}</div>

  <div class="section-title">รายไตรมาส</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>ไตรมาส</th>${YEARS.map(y=>`<th class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th>68→69</th></tr></thead>
    <tbody>${qRows}</tbody>
  </table></div>

  <div class="section-title">รายเดือน</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>เดือน</th>${YEARS.map(y=>`<th class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th>68→69</th></tr></thead>
    <tbody>${mRows}</tbody>
  </table></div>

  <div class="section-title">สรุปรีเบท</div>
  <div class="rebate-summary">${rebCards}</div>
  `;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur.trim()); cur = '';
    } else cur += c;
  }
  result.push(cur.trim());
  return result;
}

function parseCrocCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(parseCSVLine);
  const YEARS_C = ['2565','2566','2567','2568','2569'];
  const BAG_COLS  = [5, 7, 10, 13, 16];
  const SALE_COLS = [6, 8, 11, 14, 17];
  const products_c = [];
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    const group = (row[0]||'').trim();
    const nameShort = (row[1]||'').trim();
    const nameFull  = (row[2]||'').trim();
    const unitCell  = (row[5]||'').trim();
    const isProductHeader = group && nameShort && (unitCell === 'ถุง' || unitCell === 'กระปุก' || unitCell === 'แกลลอน' || unitCell === 'ชุด');
    if (isProductHeader) {
      const productName = nameFull || nameShort;
      const unit = unitCell;
      const groupName = group === 'กาวยาแนว' ? 'ยาแนว' : group;
      const monthly = {}, bags = {};
      YEARS_C.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      for (let m = 0; m < 12; m++) {
        const dataRow = rows[i + 1 + m];
        if (!dataRow) break;
        YEARS_C.forEach((y, yi) => {
          bags[y][m]    = parseFloat((dataRow[BAG_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          monthly[y][m] = parseFloat((dataRow[SALE_COLS[yi]]||'0').replace(/,/g,'')) || 0;
        });
      }
      products_c.push({ group: groupName, name: productName, unit, monthly, bags });
      i += 13;
    } else { i++; }
  }
  const monthlyTotals_c = {}, yearlyTotals_c = {}, bimonthlyByGroup_c = {};
  const GROUPS_C = ['กาวซีเมนต์','เคมีก่อสร้าง','ยาแนว'];
  YEARS_C.forEach(y => {
    monthlyTotals_c[y] = new Array(12).fill(0);
    GROUPS_C.forEach(g => {
      if (!bimonthlyByGroup_c[g]) bimonthlyByGroup_c[g] = {};
      bimonthlyByGroup_c[g][y] = new Array(6).fill(0);
    });
  });
  products_c.forEach(p => {
    YEARS_C.forEach(y => {
      p.monthly[y].forEach((v, m) => {
        monthlyTotals_c[y][m] += v;
        if (bimonthlyByGroup_c[p.group]) bimonthlyByGroup_c[p.group][y][Math.floor(m/2)] += v;
      });
    });
  });
  YEARS_C.forEach(y => { yearlyTotals_c[y] = monthlyTotals_c[y].reduce((a,b) => a+b, 0); });
  return { monthlyTotals: monthlyTotals_c, yearlyTotals: yearlyTotals_c, rebateSummary: CROC_DATA_EMBED.rebateSummary, products: products_c, bimonthlyByGroup: bimonthlyByGroup_c };
}

  const label = document.getElementById('bannerLabel');
  if (!label) return;
  if (currentBrand !== brand) return;
  const names = {qc:'ควิกโค้ท', croc:'จระเข้', sika:'ซิก้าแลงโก้'};
  if (mode === 'live') {
    label.innerHTML = `📊 ข้อมูลสด ${names[brand]} (${nm} เดือน) &nbsp;<span style="background:#16a34a;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px">LIVE</span>`;
  } else {
    label.innerHTML = `📊 ${names[brand]} ใช้ข้อมูล embed (fetch ไม่สำเร็จ) &nbsp;<span style="background:#dc2626;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px">OFFLINE</span>`;

function onCrocLoaded(data) {
  if(data.products) {
    data.products = data.products.map(p => {
      const fixYr = obj => {
        const out = {};
        Object.keys(obj).forEach(y => {
          const arr = obj[y];
          out[y] = arr.length > 12 ? arr.slice(0,12) : arr;
        });
        return out;
      };
      return { ...p, monthly: fixYr(p.monthly), bags: fixYr(p.bags) };
    });
  }
  crocData = data;
  crocLoading = false;
  const nm = (data.monthlyTotals?.['2569']||data.monthlyTotals?.[2569]||[]).reduce((l,v,i)=>v>0?i+1:l,0)||4;
  console.log('[CROC] loaded lastMonth=', nm);
  setFetchBadge('croc', data._fromEmbed ? 'embed' : 'live', nm);
  reRenderAll('croc');
}

function loadCrocData() {
  if(crocData || crocLoading) return;
  crocLoading = true;
  showBrandLoading('croc');
  const fallback = () => {
    console.warn('[CROC] fallback ใช้ embed');
    crocLoading = false;
    const d = JSON.parse(JSON.stringify(CROC_DATA_EMBED));
    d._fromEmbed = true;
    onCrocLoaded(d);
  };
  fetch(CROC_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseCrocCSV(csv);
        if (!data.products || data.products.length < 5) throw new Error('parse failed: products=' + (data.products||[]).length);
        console.log('[CROC] live fetch สำเร็จ products=', data.products.length);
        crocLoading = false;
        onCrocLoaded(data);
      } catch(e) { console.warn('[CROC] parse error:', e.message); fallback(); }
    })
    .catch(e => { console.warn('[CROC] fetch error:', e.message); fallback(); });
}

const YR_COL_C = {2565:'#6366f1',2566:'#0ea5e9',2567:'#10b981',2568:'#e07b1e',2569:'#d97706'};
const BM_LABELS = ['ม.ค.–ก.พ.','มี.ค.–เม.ย.','พ.ค.–มิ.ย.','ก.ค.–ส.ค.','ก.ย.–ต.ค.','พ.ย.–ธ.ค.'];

function parseCrocData() {
  const d = crocData;
  if(!d || !d.yearlyTotals) return { YEARS:[], monthlyTotals:{}, yearlyTotals:{}, products:[], rebateSummary:{}, bimonthlyByGroup:{} };
  const CY = Object.keys(d.yearlyTotals).map(Number).sort();
  const mTot = {}; CY.forEach(y=>{ mTot[y] = (d.monthlyTotals[String(y)] || d.monthlyTotals[y] || Array(12).fill(0)).slice(0,12); });
  const yTot = {}; CY.forEach(y=>{ yTot[y] = d.yearlyTotals[String(y)] || d.yearlyTotals[y] || 0; });
  const prods = (d.products||[]).map(p=>{
    const fixKeys = obj => { const out = {}; CY.forEach(y=>{ out[y] = (obj[String(y)] || obj[y] || Array(12).fill(0)).slice(0,12); }); return out; };
    return { ...p, group: (p.group||'').trim(), unit: p.unit||'หน่วย', monthly: fixKeys(p.monthly||{}), bags: fixKeys(p.bags||{}) };
  });
  const bmg = {};
  const GROUPS_C = ['กาวซีเมนต์','เคมีก่อสร้าง','ยาแนว'];
  const bgData = d.bimonthlyByGroup || {};
  GROUPS_C.forEach(g => {
    bmg[g] = {};
    const matchKey = Object.keys(bgData).find(k => k.trim() === g.trim());
    const src = matchKey ? bgData[matchKey] : null;
    CY.forEach(y => {
      if (src) { const yVal = src[String(y)] || src[y]; if (yVal && yVal.length) { bmg[g][y] = yVal.slice(0, 6); return; } }
      const gProds = prods.filter(p => (p.group||'').trim() === g.trim());
      bmg[g][y] = [0,1,2,3,4,5].map(b => gProds.reduce((s,p) => s + (p.monthly[y][b*2]||0) + (p.monthly[y][b*2+1]||0), 0));
    });
  });
  const rb = d.rebateSummary || {};
  return { YEARS: CY, monthlyTotals: mTot, yearlyTotals: yTot, products: prods, rebateSummary: rb, bimonthlyByGroup: bmg };
}

function parseSikaCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  });

  const YEARS_S = ['2565','2566','2567','2568','2569'];
  const BAG_COLS  = [1, 3, 5, 7, 9];
  const SALE_COLS = [2, 4, 6, 8, 10];

  const products = [];
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    const a = (row[0]||'').trim();
    const b = (row[1]||'').trim();
    if (b.includes('จำนวน')) {
      const unit = b.replace('จำนวน','').trim();
      const name = a;
      const monthly = {}, bags = {};
      YEARS_S.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      for (let m = 0; m < 12; m++) {
        const dr = rows[i + 1 + m];
        if (!dr || !dr[0] || !dr[0].includes('เดือน')) break;
        YEARS_S.forEach((y, yi) => {
          const bv = parseFloat((dr[BAG_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          const sv = parseFloat((dr[SALE_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          bags[y][m] = bv;
          monthly[y][m] = sv;
        });
      }
      products.push({ group:'เคมีก่อสร้าง', name, unit, monthly, bags });
      i += 14;
      continue;
    }
    i++;
  }

  const monthlyTotals = {}, yearlyTotals = {};
  YEARS_S.forEach(y => { monthlyTotals[y] = new Array(12).fill(0); });
  products.forEach(p => {
    YEARS_S.forEach(y => {
      p.monthly[y].forEach((v, m) => { monthlyTotals[y][m] += v; });
    });
  });
  YEARS_S.forEach(y => { yearlyTotals[y] = monthlyTotals[y].reduce((a,b) => a+b, 0); });

  return { products, monthlyTotals, yearlyTotals, rebateSummary: sikaRebateSummary };
}

function parseSikaFromEmbed() {
  const YEARS_S = ['2565','2566','2567','2568','2569'];
  const monthlyTotals = {}, yearlyTotals = {};
  YEARS_S.forEach(y => { monthlyTotals[y] = new Array(12).fill(0); });
  sikaProductsEmbed.forEach(p => {
    YEARS_S.forEach(y => {
      (p.monthly[Number(y)]||p.monthly[y]||[]).forEach((v,m) => { monthlyTotals[y][m] += v; });
    });
  });
  YEARS_S.forEach(y => { yearlyTotals[y] = monthlyTotals[y].reduce((a,b)=>a+b,0); });
  // wrap products ให้ key เป็น string
  const products = sikaProductsEmbed.map(p => ({
    ...p,
    monthly: Object.fromEntries(YEARS_S.map(y => [y, p.monthly[Number(y)] || p.monthly[y] || Array(12).fill(0)])),
    bags: Object.fromEntries(YEARS_S.map(y => [y, p.bags[Number(y)] || p.bags[y] || Array(12).fill(0)])),
  }));
  return { products, monthlyTotals, yearlyTotals, rebateSummary: sikaRebateSummary };
}

function loadSikaData() {
  if (sikaDataLive || sikaLoading) return;
  sikaLoading = true;
  showBrandLoading('sika');

  const fallback = () => {
    console.warn('[SIKA] fallback ใช้ embed');
    sikaLoading = false;
    sikaDataLive = parseSikaFromEmbed();
    setFetchBadge('sika', 'embed');
    reRenderAll('sika');
  };

  fetch(SIKA_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseSikaCSV(csv);
        if (!data.products || data.products.length < 5) throw new Error('parse failed: products=' + (data.products||[]).length);
        sikaLoading = false;
        sikaDataLive = data;
        const nm = (data.monthlyTotals?.['2569']||[]).reduce((l,v,i)=>v>0?i+1:l,0)||4;
        console.log('[SIKA] live fetch สำเร็จ lastMonth=', nm, 'products=', data.products.length);
        setFetchBadge('sika', 'live', nm);
        reRenderAll('sika');
      } catch(e) { console.warn('[SIKA] parse error:', e.message); fallback(); }
    })
    .catch(e => { console.warn('[SIKA] fetch error:', e.message); fallback(); });
}

  const yBarData = CY.map(y => y===lastY ? y69live : (sikaDataLive.yearlyTotals[String(y)]||sikaDataLive.yearlyTotals[y]||0));

function buildSikaPage2() {
  if (!sikaDataLive) sikaDataLive = parseSikaFromEmbed();
  const CY = SIKA_YEARS;
  const mTot = sikaDataLive.monthlyTotals;
  const lastY = 2569;
  const colFor = y => YR_COL_S[y] || '#6366f1';
  const NM = (mTot['2569']||mTot[2569]||[]).reduce((last,v,i)=>v>0?i+1:last,0)||4;

  const fNM = y => (mTot[String(y)]||mTot[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0);
  const fN = {}; CY.forEach(y=>fN[y]=fNM(y));
  const f4Vals=CY.map(y=>fN[y]||0); const f4Max=Math.max(...f4Vals)||1; const f4Min=Math.min(...f4Vals.filter(v=>v>0))||0; const rangeV=f4Max-f4Min||1;
  const legend=CY.map(y=>`<div class="legend-item"><div class="legend-dot" style="background:${colFor(y)}"></div><span>ปี ${y}</span></div>`).join('');
  const barsH=f4Vals.map((v,i)=>{ const h=Math.max(5,((v-f4Min)/rangeV)*75+20); const y=CY[i]; return `<div class="bar-group"><div class="bar" style="height:${h}%;background:${colFor(y)}" data-tip="ปี ${y}: ${fmtM(v)}"></div><div class="bar-label" style="color:${colFor(y)}">'${String(y).slice(2)}</div><div class="bar-val">${fmtM(v)}</div></div>`; }).join('');

  let mRows='';
  for(let m=0;m<NM;m++){
    const cells=CY.map(y=>`<td class="${y===lastY?'yr2569':''}">${fmtM((mTot[String(y)]||mTot[y]||Array(12).fill(0))[m]||0)}</td>`).join('');
    const v68=(mTot['2568']||mTot[2568]||Array(12).fill(0))[m]||0; const v69=(mTot['2569']||mTot[2569]||Array(12).fill(0))[m]||0;
    mRows+=`<tr><td>${MN[m]}</td>${cells}<td>${pctStr(v68,v69)}</td></tr>`;
  }
  mRows+=`<tr class="total-row"><td>รวม</td>${CY.map(y=>`<td>${fmtM(fN[y])}</td>`).join('')}<td>${pctStr(fN[2568],fN[lastY])}</td></tr>`;

  const groupTotAmt={},groupTotQty={};
  SIKA_GROUPS.forEach(g=>{ groupTotAmt[g]={}; groupTotQty[g]={}; CY.forEach(y=>{ groupTotAmt[g][y]=0; groupTotQty[g][y]=0; }); });
  (sikaDataLive.products||[]).forEach(p=>{ const g=p.group; if(!groupTotAmt[g]) return; CY.forEach(y=>{ groupTotAmt[g][y]+=(p.monthly[String(y)]||p.monthly[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0); groupTotQty[g][y]+=(p.bags[String(y)]||p.bags[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0); }); });

  const groupSummaryHead=`<tr><th rowspan="2" style="min-width:110px">กลุ่ม</th>${CY.map(y=>`<th colspan="2" style="text-align:center;color:${colFor(y)}" class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th rowspan="2">68→69</th></tr><tr>${CY.map(()=>`<th style="text-align:right;font-size:10px;color:#888">จำนวน</th><th style="text-align:right;font-size:10px;color:#888">บาท</th>`).join('')}</tr>`;
  const groupSummaryRows=SIKA_GROUPS.map(g=>{ const col=SIKA_GROUP_COL[g]||'#888'; const cells=CY.map(y=>{ const q=groupTotQty[g][y]||0,v=groupTotAmt[g][y]||0; return `<td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)}">${q>0?fmt(q):'–'}</td><td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)};font-weight:600">${v>0?fmtM(v):'–'}</td>`; }).join(''); const a68=groupTotAmt[g][2568]||0,a69=groupTotAmt[g][lastY]||0; return `<tr style="border-left:3px solid ${col}"><td style="font-weight:700;color:${col}">${g}</td>${cells}<td>${a68&&a69?pctStr(a68,a69):'<span class="pct neutral">–</span>'}</td></tr>`; }).join('');
  const grandAmt=CY.map(y=>fN[y]||0);
  const grandQty=CY.map(y=>(sikaDataLive.products||[]).reduce((s,p)=>s+(p.bags[String(y)]||p.bags[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0),0));

  const grandRow=`<tr class="total-row"><td>รวมทั้งหมด</td>${grandCells}<td>${pctStr(fN[2568],fN[lastY])}</td></tr>`;

    if(!prodRows) return;
    const subCells=CY.map(y=>{ const q=groupTotQty[g][y]||0,v=groupTotAmt[g][y]||0; return `<td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${q>0?fmt(q):'–'}</td><td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${v>0?fmtM(v):'–'}</td>`; }).join('');
    const sg68=groupTotAmt[g][2568]||0,sg69=groupTotAmt[g][lastY]||0;
    productSections+=`<tr style="background:${col}18"><td colspan="${CY.length*2+2}" style="font-weight:700;color:${col};font-size:12px;padding:8px 12px">▸ ${g}</td></tr>${prodRows}<tr style="background:${col}0d;border-top:1px dashed ${col}60"><td style="padding-left:14px;font-size:11px;color:${col};font-style:italic">รวม${g}</td>${subCells}<td>${sg68&&sg69?pctStr(sg68,sg69):'<span class="pct neutral">–</span>'}</td></tr>`;
  });

  return `
  <div class="page-title">รายการสินค้า ${nmLabel(NM)} (ซิก้าแลงโก้)</div>
  <div class="page-sub">ยอดซื้อ (บาท) และจำนวน เดือน 1–${NM} แยกตามสินค้าและปี</div>
  <div class="chart-wrap"><div class="chart-title">ยอดซื้อรวม ${nmLabel(NM)} รายปี (บาท)</div><div class="chart-legend">${legend}</div><div class="bar-chart">${barsH}</div></div>
  <div class="section-title">เทียบรายเดือน (${nmLabel(NM)})</div>
  <div class="tbl-wrap"><table><thead><tr><th>เดือน</th>${CY.map(y=>`<th class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th>68→69 ⭐</th></tr></thead><tbody>${mRows}</tbody></table></div>
  <div class="section-title">ยอดรวมตามกลุ่มสินค้า (${nmLabel(NM)})</div>
  <div class="tbl-wrap"><table><thead>${groupSummaryHead}</thead><tbody>${groupSummaryRows}${grandRow}</tbody></table></div>
  <div class="section-title">รายละเอียดสินค้า ${nmLabel(NM)} ทุกปี</div>
  <div class="note">จำนวน (ซ้าย) และยอดซื้อบาท (ขวา) เฉพาะเดือน 1–${NM}</div>
  <div class="prod-tbl-wrap"><table>
    <thead><tr><th rowspan="2" style="min-width:160px">สินค้า</th>${CY.map(y=>`<th colspan="2" style="text-align:center;color:${colFor(y)}" class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th rowspan="2">68→69</th></tr><tr>${CY.map(()=>`<th style="text-align:right;font-size:10px;color:#888">จำนวน</th><th style="text-align:right;font-size:10px;color:#888">บาท</th>`).join('')}</tr></thead>
    <tbody>${productSections}</tbody>
  </table></div>`;
}

// ── reRenderAll: เรียกหลัง live data โหลดสำเร็จ ──
function reRenderAll(brand) {
  // ลบ rendered cache ทั้งหมดของ brand นี้
  Object.keys(rendered).forEach(k => { if(k.startsWith(brand+'_')) delete rendered[k]; });
  // re-render เฉพาะ page ที่ active อยู่
  const section = brand==='qc' ? qcSection : brand==='croc' ? crocSection : sikaSection;
  const pages = section.querySelectorAll('.page');
  pages.forEach((div, idx) => {
    if (div.classList.contains('active')) {
      renderPage(brand, idx, div);
    }
  });
  // อัปเดต footer
  const nm = brand==='qc' ? getLastMonth(qcDataLive)
           : brand==='croc' ? (crocData ? getLastMonth({monthlyTotals: parseCrocData().monthlyTotals}) : 4)
           : getLastMonth(sikaDataLive);
  updateFooter(nm);
}

function renderPage(brand, idx, divEl) {
  const key = `${brand}_${idx}`;
  if (brand === 'qc') {
    divEl.innerHTML = qcPages[idx].build();
  } else if (brand === 'croc') {
    divEl.innerHTML = idx===0 ? buildCrocPage1() : buildCrocPage2();
  } else {
    divEl.innerHTML = idx===0 ? buildSikaPage1() : buildSikaPage2();
  }
  rendered[key] = true;
}

function showPage(idx, brand) {
  const prefix = brand || currentBrand;
  navTabs.querySelectorAll(`.tab-btn[data-brand="${prefix}"]`).forEach((b,i)=>b.classList.toggle('active',i===idx));
  const section = prefix==='qc' ? qcSection : prefix==='croc' ? crocSection : sikaSection;
  section.querySelectorAll('.page').forEach((d,i)=>d.classList.toggle('active',i===idx));

  const key = `${prefix}_${idx}`;
  if (!rendered[key]) {
    const div = section.querySelectorAll('.page')[idx];
    renderPage(prefix, idx, div);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

  } else if(brand==='croc') {
    bannerLink.href = SHEET_CROC;
    bannerLabel.textContent = '📊 ดูข้อมูลดิบ สินค้าจระเข้ ใน Google Sheets';
  } else {
    bannerLink.href = SHEET_SIKA;
    bannerLabel.textContent = '📊 ดูข้อมูลดิบ สินค้าซิก้า ใน Google Sheets';
  }

  if(brand==='qc'){
    qcSection.style.display=''; crocSection.style.display='none'; sikaSection.style.display='none';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='qc' ? '' : 'none'; });
  } else if(brand==='croc') {
    qcSection.style.display='none'; crocSection.style.display=''; sikaSection.style.display='none';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='croc' ? '' : 'none'; });
    loadCrocData();
  } else {
    qcSection.style.display='none'; crocSection.style.display='none'; sikaSection.style.display='';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='sika' ? '' : 'none'; });
    loadSikaData();
  }
}

// ── INIT ──
loadQCData();
showPage(0, 'qc');

</script>
