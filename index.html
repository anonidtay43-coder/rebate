<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แดชบอร์ด รีเบทแต่ละกลุ่ม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #ffffff;
  --surface:   #f8f9fa;
  --surface2:  #f0f1f3;
  --border:    #e2e5e9;
  --accent:    #e07b1e;
  --accent2:   #2563eb;
  --green:     #16a34a;
  --red:       #dc2626;
  --yellow:    #d97706;
  --text:      #111827;
  --muted:     #6b7280;
  --rebate:    #16a34a;
  --font:      'Sarabun', sans-serif;
  --mono:      'IBM Plex Mono', monospace;
  --radius:    10px;
  --c65: #6366f1;
  --c66: #0ea5e9;
  --c67: #10b981;
  --c68: #e07b1e;
  --c69: #d97706;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.brand { font-size: 17px; font-weight: 700; letter-spacing: .5px; color: var(--accent); }
.brand span { color: var(--text); font-weight: 300; }
.brand-switcher { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.brand-pill {
  font-size: 15px; font-weight: 700; letter-spacing: .5px;
  background: none; border: 2px solid var(--border);
  border-radius: 20px; padding: 4px 11px; cursor: pointer;
  font-family: var(--font); color: var(--muted);
  transition: all .2s; white-space: nowrap;
}
.brand-pill span { font-weight: 300; }
.brand-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(224,123,30,.07); }
.brand-pill#brandCROC.active { border-color: #0ea5e9; color: #0ea5e9; background: rgba(14,165,233,.07); }
.brand-pill#brandSIKA.active { border-color: #e11d48; color: #e11d48; background: rgba(225,29,72,.07); }
.brand-pill:hover:not(.active) { border-color: #aaa; color: var(--text); }
.nav-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  white-space: nowrap; background: none; border: none;
  color: var(--muted); font-family: var(--font);
  font-size: 15px; font-weight: 600;
  padding: 6px 12px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active, .tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { color: var(--accent); }
.data-btn {
  white-space: nowrap;
  background: linear-gradient(135deg, #16a34a, #15803d);
  border: none;
  color: #fff;
  font-family: var(--font);
  font-size: 14px; font-weight: 700;
  padding: 5px 11px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  letter-spacing: .3px;
  box-shadow: 0 1px 4px rgba(22,163,74,.35);
  flex-shrink: 0;
}
.data-btn:hover { background: linear-gradient(135deg, #15803d, #166534); box-shadow: 0 2px 8px rgba(22,163,74,.45); transform: translateY(-1px); }
.data-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.nav-right { display: flex; align-items: center; gap: 6px; }

main { padding: 16px; max-width: 900px; margin: 0 auto; }
.page { display: none; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }

.section-title {
  font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin: 22px 0 11px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 11px;
  transition: border-color .2s, box-shadow .2s;
}
.stat-card:hover { border-color: var(--accent2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.stat-card .year-label { font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: 1px; margin-bottom: 5px; }
.stat-card .value { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
.stat-card .sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.stat-card .badge { font-size: 13px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-top: 5px; }
.badge.up   { background: rgba(22,163,74,.12); color: var(--green); }
.badge.down { background: rgba(220,38,38,.10); color: var(--red); }
.stat-card.highlight { border-color: var(--accent); }
.stat-card.highlight .value { color: var(--accent); }

/* ── BAR CHART ── */
.chart-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px 10px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.chart-title { font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); font-weight: 600; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 260px;
  min-width: 260px;
  padding-top: 20px;
}.bar {
  width: 100%;
  max-width: 50px;
}
.bar-group { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; flex: 1; height: 100%;}
.bar {
  width: 100%; border-radius: 5px 5px 0 0;
  transition: height .6s cubic-bezier(.4,0,.2,1), opacity .2s;
  min-height: 4px; cursor: pointer;
  position: relative;
}
.bar:hover { opacity: 0.82; }
.bar:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1f2937; border: 1px solid #374151;
  color: #fff; font-size: 11px; padding: 4px 8px;
  border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 10;
}
.bar-label { font-size: 13px; color: var(--muted); text-align: center; font-weight: 600; }
.bar-val   { font-size: 12px; color: var(--muted); font-family: var(--mono); }

/* ── TABLE ── */
.tbl-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: auto; margin-bottom: 16px;
}
table { width: 100%; border-collapse: collapse; min-width: 340px; }
thead th {
  background: var(--surface2);
  color: var(--muted); font-size: 13px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  padding: 9px 11px; text-align: right; white-space: nowrap;
  border-bottom: 1.5px solid var(--border);
}
thead th:first-child { text-align: left; position: sticky; left: 0; background: var(--surface2); }
tbody td {
  padding: 8px 11px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 14px; text-align: right; white-space: nowrap;
}
tbody td:first-child {
  text-align: left; font-family: var(--font); font-size: 15px;
  position: sticky; left: 0; background: var(--surface);
  border-right: 1px solid var(--border);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: rgba(0,0,0,.02); }
tbody tr:nth-child(even) td:first-child { background: rgba(0,0,0,.02); }
tbody tr.total-row td { background: var(--surface2) !important; font-weight: 700; color: var(--accent); }
.pct.pos { color: var(--green); }
.pct.neg { color: var(--red); }
.pct.neutral { color: var(--muted); }
.yr2569 { color: var(--yellow) !important; font-weight: 600; }
.highlight-cell { color: var(--accent) !important; font-weight: 700; }

/* ── REBATE ── */
.rebate-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
@media (min-width: 480px) { .rebate-summary { grid-template-columns: repeat(4,1fr); } }
.rebate-item {
  background: var(--surface); border: 1.5px solid rgba(22,163,74,.4);
  border-radius: var(--radius); padding: 12px;
}
.rebate-item .r-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; line-height: 1.4; }
.rebate-item .r-val { font-family: var(--mono); font-size: 17px; font-weight: 700; color: var(--rebate); }
.rebate-item .r-pct { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ── NOTE ── */
.note {
  background: rgba(217,119,6,.07); border: 1px solid rgba(217,119,6,.3);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 14px; color: var(--yellow); margin-bottom: 14px;
  display: flex; align-items: flex-start; gap: 8px;
}
.note::before { content: '⚠'; flex-shrink: 0; margin-top: 1px; }

.page-title { font-size: 22px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
.page-sub   { font-size: 14px; color: var(--muted); margin-bottom: 18px; }

footer {
  text-align: center; padding: 20px 16px;
  font-size: 13px; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 28px;
}

/* ── PRODUCT TABLE (page 2) ── */
.prod-tbl-wrap {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: auto; margin-bottom: 16px;
}
.prod-tbl-wrap table { min-width: 480px; }
.prod-name-cell { font-size: 14px !important; font-family: var(--font) !important; max-width: 160px; white-space: normal !important; line-height: 1.3; }

/* ── N-month mini-cards row on page 1 ── */
.four-month-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px; margin-bottom: 16px;
}
.fm-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 10px 9px; text-align: center;
}
.fm-card .fm-year { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: .8px; margin-bottom: 4px; }
.fm-card .fm-val  { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.fm-card .fm-badge { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 20px; display: inline-block; margin-top: 4px; }

@media (max-width: 480px) {
  .topbar { height: 48px; }
  .brand { font-size: 15px; }
  .tab-btn { font-size: 14px; padding: 5px 9px; }
  main { padding: 10px; }
  .stat-grid { grid-template-columns: repeat(2,1fr); gap: 7px; }
  .stat-card .value { font-size: 16px; }
  .page-title { font-size: 19px; }
  .bar-chart { height: 95px; }
  .four-month-strip { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand-switcher">
    <button class="brand-pill active" id="brandQC" onclick="switchBrand('qc')">ควิก<span>โค้ท</span></button>
    <button class="brand-pill" id="brandCROC" onclick="switchBrand('croc')">จระ<span>เข้</span></button>
    <button class="brand-pill" id="brandSIKA" onclick="switchBrand('sika')">ซิก้า<span>/แลงโก้</span></button>
  </div>
  <nav class="nav-tabs" id="navTabs"></nav>
</div>
<div id="dataBanner" style="background:linear-gradient(90deg,#dcfce7,#bbf7d0); border-bottom:2px solid #86efac; padding:8px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;">
  <span id="bannerLabel" style="font-size:12px; color:#15803d; font-weight:600;">📊 ดูข้อมูลดิบ สินค้าควิกโค้ทใน Google Sheets</span>
  <a id="bannerLink" href="https://docs.google.com/spreadsheets/d/1aKR6KmUGosext5SE1d92VF-CVEHeCJEFfM_IvHE6gzY/edit?gid=246191077#gid=246191077" target="_blank" rel="noopener" style="background:#16a34a;color:#fff;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:0 1px 4px rgba(22,163,74,.4)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    เปิด Google Sheet
  </a>
</div>
<main id="mainContent"></main>
<footer id="footerEl">ข้อมูล ณ เดือนพ.ค. 2569 &nbsp;|&nbsp; หน่วย: บาท (ไม่รวม VAT)</footer>

<script>

// ══════════════════════════════════════════════
// ── SHARED HELPERS ──
// ══════════════════════════════════════════════
const YEARS = [2565,2566,2567,2568,2569];
const MN = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YR_COL = {2565:'#6366f1',2566:'#0ea5e9',2567:'#10b981',2568:'#e07b1e',2569:'#d97706'};

const fmt  = (n) => (n && n!==0) ? n.toLocaleString('th-TH',{maximumFractionDigits:0}) : '–';
const fmtM = (n) => {
  if(!n) return '–';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n.toLocaleString('th-TH',{maximumFractionDigits:0});
};
const pctStr = (a,b) => {
  if(!a) return '<span class="pct neutral">–</span>';
  const p = ((b-a)/a)*100;
  const cls = p>0?'pos':'neg';
  return `<span class="pct ${cls}">${p>0?'+':''}${p.toFixed(1)}%</span>`;
};
const pChange = (a,b) => a ? ((b-a)/a) : null;

// ── getLastMonth: นับเดือนสุดท้ายที่มียอด จาก data object ──
// รองรับทั้ง key เป็น string '2569' และ number 2569
function getLastMonth(dataObj) {
  if (!dataObj) return 4;
  const mTot = dataObj.monthlyTotals;
  if (!mTot) return 4;
  const arr = mTot['2569'] || mTot[2569] || [];
  const last = arr.reduce((acc, v, i) => (v && v > 0 ? i + 1 : acc), 0);
  return last || 4;
}

// ── nmLabel: แปลงจำนวนเดือนเป็น label ──
function nmLabel(nm) {
  return `ม.ค.–${MN[nm-1]}`;
}

// ── updateFooter: อัปเดต footer ตามเดือนล่าสุด ──
function updateFooter(nm) {
  const el = document.getElementById('footerEl');
  if (el) el.innerHTML = `ข้อมูล ณ เดือน${MN[nm-1]} 2569 &nbsp;|&nbsp; หน่วย: บาท (ไม่รวม VAT)`;
}

// ══════════════════════════════════════════════
// ── QUICKCOAT DATA ──
// ══════════════════════════════════════════════
const QC_SHEET_ID = '1aKR6KmUGosext5SE1d92VF-CVEHeCJEFfM_IvHE6gzY';
const QC_GID = '246191077';
const QC_API = `https://docs.google.com/spreadsheets/d/${QC_SHEET_ID}/export?format=csv&gid=${QC_GID}`;

let qcDataLive = null;
let qcLoading = false;

function parseQCCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  });

  const YEARS_Q = ['2565','2566','2567','2568','2569'];
  const BAG_COLS  = [1, 3, 5, 7, 9];
  const SALE_COLS = [2, 4, 6, 8, 10];

  // debug: log first 5 rows to understand format
  console.log('[QC CSV] first 3 rows:', rows.slice(0,3).map(r=>r.slice(0,6)));

  const UNIT_VALS = ['ถุง','กระปุก','แกลลอน','ชุด','ถัง'];
  const products = [];
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    const a = (row[0]||'').replace(/\xa0/g,'\u00a0').replace(/\u00a0/g,' ').trim();
    const b = (row[1]||'').trim();
    const c2 = (row[2]||'').trim();

    // รองรับ 2 format:
    // Format 1 (QC xlsx): col B='จำนวนถุง', col C='ยอดซื้อ'
    // Format 2 (CROC style): col B='ถุง', col C='ยอด'/'ยอดซื้อ'
    const isQCHeader = b.includes('จำนวน') && (c2.includes('ยอด') || c2.includes('ราคา'));
    const isUnitHeader = UNIT_VALS.includes(b) && (c2 === 'ยอด' || c2 === 'ยอดซื้อ');
    const isProductHeader = (isQCHeader || isUnitHeader) && a && !a.includes('เดือน') && !a.includes('รวม');

    if (isProductHeader) {
      const unit = isQCHeader ? (b.replace('จำนวน','').trim() || 'ถุง') : b;
      const name = a;
      const monthly = {}, bags = {};
      YEARS_Q.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      // อ่าน 12 เดือนถัดไป — ข้าม row ว่างหรือ row ที่ไม่ใช่เดือน
      let m = 0;
      let j = i + 1;
      while (m < 12 && j < rows.length) {
        const dr = rows[j];
        const da = (dr[0]||'').trim();
        if (!da) { j++; continue; } // ข้าม row ว่าง
        if (!da.includes('เดือน')) break; // หมดข้อมูลสินค้านี้แล้ว
        YEARS_Q.forEach((y, yi) => {
          const bRaw = (dr[BAG_COLS[yi]]||'').toString().replace(/,/g,'').replace(/^-+$/,'0').replace(/^=.*$/,'0').trim();
          const sRaw = (dr[SALE_COLS[yi]]||'').toString().replace(/,/g,'').replace(/^-+$/,'0').replace(/^=.*$/,'0').trim();
          bags[y][m]    = parseFloat(bRaw) || 0;
          monthly[y][m] = parseFloat(sRaw) || 0;
        });
        m++;
        j++;
      }
      products.push({ name, unit, monthly, bags });
      i = j - 1;
      continue;
    }
    i++;
  }
  console.log('[QC CSV] parse ได้ products:', products.length);

  const monthlyTotals = {}, yearlyTotals = {};
  YEARS_Q.forEach(y => { monthlyTotals[y] = new Array(12).fill(0); });
  products.forEach(p => {
    YEARS_Q.forEach(y => {
      p.monthly[y].forEach((v, m) => { monthlyTotals[y][m] += v; });
    });
  });
  YEARS_Q.forEach(y => { yearlyTotals[y] = monthlyTotals[y].reduce((a,b) => a+b, 0); });

  const last69 = monthlyTotals['2569'].reduce((last, v, m) => v > 0 ? m+1 : last, 0);

  // อ่านค่า rebate 2569 จาก row ที่มี 'รวมทั้งหมดได้รีเบท'
  let rebate2569 = null, rebate2567 = null, rebate2568 = null;
  for (let ri = 0; ri < rows.length; ri++) {
    const ra = (rows[ri][0]||'').trim();
    if (ra.includes('รวมทั้งหมดได้รีเบท') || ra.includes('รีเบท ประมาณ')) {
      // col D=index3 = current(2569), col E=index4 = proposed(2569)
      // col B=index1 = rebate2567, col C=index2 = rebate2568
      const cur  = parseFloat((rows[ri][3]||'').toString().replace(/,/g,'')) || 0;
      const prop = parseFloat((rows[ri][4]||'').toString().replace(/,/g,'')) || 0;
      const r67  = parseFloat((rows[ri][1]||'').toString().replace(/,/g,'')) || 0;
      const r68  = parseFloat((rows[ri][2]||'').toString().replace(/,/g,'')) || 0;
      let curP = 0, propP = 0, r67P = 0, r68P = 0;
      if (ri+1 < rows.length) {
        curP  = parseFloat((rows[ri+1][3]||'').toString().replace(/,/g,'')) || 0;
        propP = parseFloat((rows[ri+1][4]||'').toString().replace(/,/g,'')) || 0;
        r67P  = parseFloat((rows[ri+1][1]||'').toString().replace(/,/g,'')) || 0;
        r68P  = parseFloat((rows[ri+1][2]||'').toString().replace(/,/g,'')) || 0;
      }
      if (cur > 0 || prop > 0) {
        rebate2569 = { current: cur, currentPct: curP, proposed: prop, proposedPct: propP };
      }
      if (r67 > 0) rebate2567 = { total: r67, pct: r67P };
      if (r68 > 0) rebate2568 = { total: r68, pct: r68P };
      console.log('[QC CSV] rebate2567:', rebate2567, 'rebate2568:', rebate2568, 'rebate2569:', rebate2569);
      break;
    }
  }

  return { products, monthlyTotals, yearlyTotals, lastMonth2569: last69, rebate2569, rebate2567, rebate2568 };
}



function showLoadError(brand, reason) {
  const section = brand==='qc' ? qcSection : brand==='croc' ? crocSection : sikaSection;
  if (!section) return;
  section.querySelectorAll('.page').forEach(p => {
    p.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="font-size:15px;font-weight:700;color:#dc2626;margin-bottom:8px">โหลดข้อมูลไม่สำเร็จ</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:16px">${reason}</div>
      <button onclick="retryLoad('${brand}')" style="background:#2563eb;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)">ลองใหม่</button>
    </div>`;
  });
}

function retryLoad(brand) {
  if (brand==='qc') { qcLoading=false; qcDataLive=null; loadQCData(); }
  else if (brand==='croc') { crocLoading=false; crocData=null; loadCrocData(); }
  else { sikaLoading=false; sikaDataLive=null; loadSikaData(); }
}

function loadQCData() {
  if (qcDataLive || qcLoading) return;
  qcLoading = true;
  fetch(QC_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseQCCSV(csv);
        if (!data.products || data.products.length < 1) throw new Error('parse ไม่สำเร็จ: products=' + (data.products||[]).length);
        qcLoading = false;
        qcDataLive = data;
        console.log('[QC] live fetch สำเร็จ lastMonth=', data.lastMonth2569, 'products=', data.products.length);
        setFetchBadge('qc', 'live', data.lastMonth2569);
        reRenderAll('qc');
      } catch(e) {
        qcLoading = false;
        console.error('[QC] parse error:', e.message);
        showLoadError('qc', 'อ่านข้อมูลจาก Google Sheets ไม่สำเร็จ: ' + e.message);
      }
    })
    .catch(e => {
      qcLoading = false;
      console.error('[QC] fetch error:', e.message);
      showLoadError('qc', 'เชื่อมต่อ Google Sheets ไม่ได้: ' + e.message);
    });
}

const CROC_SHEET_ID = '1ru3ctlBD9jaHE62NOUk6Dcdh-tP5cXqzzXhwW0hsjK4';
const CROC_GID = '1779795165';
const CROC_API = `https://docs.google.com/spreadsheets/d/${CROC_SHEET_ID}/export?format=csv&gid=${CROC_GID}`;

let crocData = null;
let crocLoading = false;

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur.trim()); cur = '';
    } else cur += c;
  }
  result.push(cur.trim());
  return result;
}

function parseCrocCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(parseCSVLine);

  const YEARS_C = ['2565','2566','2567','2568','2569'];
  const BAG_COLS_C  = [1, 3, 5, 7, 9];
  const SALE_COLS_C = [2, 4, 6, 8, 10];
  const UNIT_VALS = ['ถุง','กระปุก','แกลลอน','ชุด','ถัง'];

  console.log('[CROC CSV] first 3 rows:', rows.slice(0,3).map(r=>r.slice(0,6)));

  const products_c = [];
  let currentGroup = '';

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const a = (row[0]||'').replace(/\xa0/g,' ').trim();
    const b = (row[1]||'').trim();
    const c = (row[2]||'').trim();

    // group header: exact match เท่านั้น และ col B ต้องเป็น 'ปี...' หรือ blank (ไม่ใช่ unit)
    const EXACT_GROUPS = ['กาวซีเมนต์','เคมีก่อสร้าง','กาวยาแนว','ยาแนว'];
    const bIsYearOrBlank = !b || b.startsWith('ปี ');
    if (a && EXACT_GROUPS.some(g => a === g || a === g + ' ') && bIsYearOrBlank && !a.includes('เดือน') && !a.includes('รวม')) {
      currentGroup = a.replace('กาวยาแนว','ยาแนว').trim();
    }

    const bIsUnit = UNIT_VALS.includes(b) || UNIT_VALS.some(u => b.includes(u));
    const cIsYod = (c === 'ยอด' || c === 'ยอดซื้อ' || c.includes('ยอด'));
    if (bIsUnit && cIsYod && a && !a.includes('เดือน') && !a.includes('รวม') && !a.includes('ปี ')) {
      // ถ้า currentGroup ว่าง ให้ scan ย้อนกลับหา group
      if (!currentGroup) {
        for (let back = i - 1; back >= Math.max(0, i - 5); back--) {
          const ba = (rows[back][0]||'').replace(/\xa0/g,' ').trim();
          if (ba && knownGroups.some(g => ba.includes(g)) && !ba.includes('เดือน') && !ba.includes('รวม')) {
            currentGroup = ba.replace('กาวยาแนว','ยาแนว').trim();
            break;
          }
        }
      }
      const name = a;
      const unit = b;
      const monthly = {}, bags = {};
      YEARS_C.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      let m = 0;
      let j = i + 1;
      while (m < 12 && j < rows.length) {
        const dr = rows[j];
        const da = (dr[0]||'').trim();
        if (!da) { j++; continue; }
        if (!da.includes('เดือน')) break;
        YEARS_C.forEach((y, yi) => {
          const bRaw = (dr[BAG_COLS_C[yi]]||'').toString().replace(/,/g,'').replace(/^-+$/,'0').trim();
          const sRaw = (dr[SALE_COLS_C[yi]]||'').toString().replace(/,/g,'').replace(/^-+$/,'0').trim();
          bags[y][m]    = parseFloat(bRaw) || 0;
          monthly[y][m] = parseFloat(sRaw) || 0;
        });
        m++;
        j++;
      }
      products_c.push({ group: currentGroup, name, unit, monthly, bags });
      i = j - 1;
      continue;
    }
  }

  console.log('[CROC CSV] parse ได้ products:', products_c.length);

  const GROUPS_C = ['กาวซีเมนต์','เคมีก่อสร้าง','ยาแนว'];
  const monthlyTotals_c = {}, yearlyTotals_c = {}, bimonthlyByGroup_c = {};
  YEARS_C.forEach(y => {
    monthlyTotals_c[y] = new Array(12).fill(0);
    GROUPS_C.forEach(g => {
      if (!bimonthlyByGroup_c[g]) bimonthlyByGroup_c[g] = {};
      bimonthlyByGroup_c[g][y] = new Array(6).fill(0);
    });
  });
  products_c.forEach(p => {
    YEARS_C.forEach(y => {
      p.monthly[y].forEach((v, m) => {
        monthlyTotals_c[y][m] += v;
        if (bimonthlyByGroup_c[p.group]) bimonthlyByGroup_c[p.group][y][Math.floor(m/2)] += v;
      });
    });
  });
  YEARS_C.forEach(y => { yearlyTotals_c[y] = monthlyTotals_c[y].reduce((a,b) => a+b, 0); });

  // อ่าน rebate จาก row ที่มี 'รวมทั้งหมดได้รีเบท'
  const rebateSummary = {};
  for (let ri = 0; ri < rows.length; ri++) {
    const ra = (rows[ri][0]||'').trim();
    if (ra.includes('รวมทั้งหมดได้รีเบท') || ra.includes('รีเบท ประมาณ')) {
      const r67 = parseFloat((rows[ri][1]||'').toString().replace(/,/g,'')) || 0;
      const r68 = parseFloat((rows[ri][2]||'').toString().replace(/,/g,'')) || 0;
      const r69 = parseFloat((rows[ri][3]||'').toString().replace(/,/g,'')) || 0;
      let r67P=0, r68P=0;
      if (ri+1 < rows.length) {
        r67P = parseFloat((rows[ri+1][1]||'').toString().replace(/,/g,'')) || 0;
        r68P = parseFloat((rows[ri+1][2]||'').toString().replace(/,/g,'')) || 0;
      }
      let r69P = 0;
      if (ri+1 < rows.length) {
        r69P = parseFloat((rows[ri+1][3]||'').toString().replace(/,/g,'')) || 0;
      }
      if (r67 > 0) rebateSummary['2567'] = { total: r67, pct: r67P };
      if (r68 > 0) rebateSummary['2568'] = { total: r68, pct: r68P };
      if (r69 > 0) rebateSummary['2569_current'] = { total: r69, pct: r69P };
      console.log('[CROC CSV] rebateSummary:', rebateSummary);
      break;
    }
  }

  return {
    monthlyTotals: monthlyTotals_c, yearlyTotals: yearlyTotals_c,
    rebateSummary,
    products: products_c, bimonthlyByGroup: bimonthlyByGroup_c
  };
}

function setFetchBadge(brand, mode, nm) {

function onCrocLoaded(data) {
  if(data.products) {
    data.products = data.products.map(p => {
      const fixYr = obj => {
        const out = {};
        Object.keys(obj).forEach(y => {
          const arr = obj[y];
          out[y] = arr.length > 12 ? arr.slice(0,12) : arr;
        });
        return out;
      };
      return { ...p, monthly: fixYr(p.monthly), bags: fixYr(p.bags) };
    });
  }
  crocData = data;
  crocLoading = false;
  const nm = (data.monthlyTotals?.['2569']||data.monthlyTotals?.[2569]||[]).reduce((l,v,i)=>v>0?i+1:l,0)||4;
  console.log('[CROC] loaded lastMonth=', nm);
  setFetchBadge('croc', 'live', nm);
  reRenderAll('croc');
}

function loadCrocData() {
  if(crocData || crocLoading) return;
  crocLoading = true;
  showBrandLoading('croc');
  fetch(CROC_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseCrocCSV(csv);
        if (!data.products || data.products.length < 1) throw new Error('parse ไม่สำเร็จ: products=' + (data.products||[]).length);
        console.log('[CROC] live fetch สำเร็จ products=', data.products.length);
        crocLoading = false;
        onCrocLoaded(data);
      } catch(e) {
        crocLoading = false;
        console.error('[CROC] parse error:', e.message);
        showLoadError('croc', 'อ่านข้อมูลจาก Google Sheets ไม่สำเร็จ: ' + e.message);
      }
    })
    .catch(e => {
      crocLoading = false;
      console.error('[CROC] fetch error:', e.message);
      showLoadError('croc', 'เชื่อมต่อ Google Sheets ไม่ได้: ' + e.message);
    });
}

const YR_COL_C = {2565:'#6366f1',2566:'#0ea5e9',2567:'#10b981',2568:'#e07b1e',2569:'#d97706'};
const BM_LABELS = ['ม.ค.–ก.พ.','มี.ค.–เม.ย.','พ.ค.–มิ.ย.','ก.ค.–ส.ค.','ก.ย.–ต.ค.','พ.ย.–ธ.ค.'];

function parseCrocData() {
  const d = crocData;
  if(!d || !d.yearlyTotals) return { YEARS:[], monthlyTotals:{}, yearlyTotals:{}, products:[], rebateSummary:{}, bimonthlyByGroup:{} };
  const CY = Object.keys(d.yearlyTotals).map(Number).sort();
  const mTot = {}; CY.forEach(y=>{ mTot[y] = (d.monthlyTotals[String(y)] || d.monthlyTotals[y] || Array(12).fill(0)).slice(0,12); });
  const yTot = {}; CY.forEach(y=>{ yTot[y] = d.yearlyTotals[String(y)] || d.yearlyTotals[y] || 0; });
  const prods = (d.products||[]).map(p=>{
    const fixKeys = obj => { const out = {}; CY.forEach(y=>{ out[y] = (obj[String(y)] || obj[y] || Array(12).fill(0)).slice(0,12); }); return out; };
    return { ...p, group: (p.group||'').trim(), unit: p.unit||'หน่วย', monthly: fixKeys(p.monthly||{}), bags: fixKeys(p.bags||{}) };
  });
  const bmg = {};
  const GROUPS_C = ['กาวซีเมนต์','เคมีก่อสร้าง','ยาแนว'];
  const bgData = d.bimonthlyByGroup || {};
  GROUPS_C.forEach(g => {
    bmg[g] = {};
    const matchKey = Object.keys(bgData).find(k => k.trim() === g.trim());
    const src = matchKey ? bgData[matchKey] : null;
    CY.forEach(y => {
      if (src) { const yVal = src[String(y)] || src[y]; if (yVal && yVal.length) { bmg[g][y] = yVal.slice(0, 6); return; } }
      const gProds = prods.filter(p => (p.group||'').trim() === g.trim());
      bmg[g][y] = [0,1,2,3,4,5].map(b => gProds.reduce((s,p) => s + (p.monthly[y][b*2]||0) + (p.monthly[y][b*2+1]||0), 0));
    });
  });
  const rb = d.rebateSummary || {};
  return { YEARS: CY, monthlyTotals: mTot, yearlyTotals: yTot, products: prods, rebateSummary: rb, bimonthlyByGroup: bmg };
}

const SIKA_YEARS    = [2565, 2566, 2567, 2568, 2569];

const SIKA_GROUPS = ['เคมีก่อสร้าง'];

function parseSikaCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const rows = lines.map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  });

  const YEARS_S = ['2565','2566','2567','2568','2569'];
  const BAG_COLS  = [1, 3, 5, 7, 9];
  const SALE_COLS = [2, 4, 6, 8, 10];

  const products = [];
  let i = 0;
  while (i < rows.length) {
    const row = rows[i];
    const a = (row[0]||'').trim();
    const b = (row[1]||'').trim();
    if (b.includes('จำนวน')) {
      const unit = b.replace('จำนวน','').trim();
      const name = a;
      const monthly = {}, bags = {};
      YEARS_S.forEach(y => { monthly[y] = new Array(12).fill(0); bags[y] = new Array(12).fill(0); });
      for (let m = 0; m < 12; m++) {
        const dr = rows[i + 1 + m];
        if (!dr || !dr[0] || !dr[0].includes('เดือน')) break;
        YEARS_S.forEach((y, yi) => {
          const bv = parseFloat((dr[BAG_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          const sv = parseFloat((dr[SALE_COLS[yi]]||'0').replace(/,/g,'')) || 0;
          bags[y][m] = bv;
          monthly[y][m] = sv;
        });
      }
      products.push({ group:'เคมีก่อสร้าง', name, unit, monthly, bags });
      i += 14;
      continue;
    }
    i++;
  }

  const monthlyTotals = {}, yearlyTotals = {};
  YEARS_S.forEach(y => { monthlyTotals[y] = new Array(12).fill(0); });
  products.forEach(p => {
    YEARS_S.forEach(y => {
      p.monthly[y].forEach((v, m) => { monthlyTotals[y][m] += v; });
    });
  });
  YEARS_S.forEach(y => { yearlyTotals[y] = monthlyTotals[y].reduce((a,b) => a+b, 0); });

  // ── parse rebateSummary ──
  const rebateSummary = {};
  for (let ri = 0; ri < rows.length; ri++) {
    const cell0 = (rows[ri][0]||'').trim();
    if (cell0.includes('\u0e23\u0e27\u0e21\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14\u0e44\u0e14\u0e49\u0e23\u0e35\u0e40\u0e1a\u0e17')) {
      const totals = [rows[ri][1], rows[ri][2], rows[ri][3]];
      let pcts = ['','',''];
      if (ri+1 < rows.length && (rows[ri+1][0]||'').includes('\u0e04\u0e34\u0e14\u0e40\u0e1b\u0e47\u0e19\u0e40\u0e1b\u0e2d\u0e23\u0e4c\u0e40\u0e0b\u0e47\u0e19')) {
        pcts = [rows[ri+1][1], rows[ri+1][2], rows[ri+1][3]];
      }
      [2567,2568,2569].forEach((yr,idx) => {
        const t = parseFloat((totals[idx]||'0').replace(/,/g,'')) || 0;
        const p = parseFloat((pcts[idx]||'0').replace(/,/g,'')) || null;
        if (t > 0 || p) rebateSummary[yr] = { total: t, pct: p };
      });
      break;
    }
  }

  return { products, monthlyTotals, yearlyTotals, rebateSummary };
}

function loadSikaData() {
  if (sikaDataLive || sikaLoading) return;
  sikaLoading = true;
  showBrandLoading('sika');

  fetch(SIKA_API)
    .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(csv => {
      try {
        const data = parseSikaCSV(csv);
        if (!data.products || data.products.length < 1) throw new Error('parse ไม่สำเร็จ: products=' + (data.products||[]).length);
        sikaLoading = false;
        sikaDataLive = data;
        const nm = (data.monthlyTotals?.['2569']||[]).reduce((l,v,i)=>v>0?i+1:l,0)||4;
        console.log('[SIKA] live fetch สำเร็จ lastMonth=', nm, 'products=', data.products.length);
        setFetchBadge('sika', 'live', nm);
        reRenderAll('sika');
      } catch(e) {
        sikaLoading = false;
        console.error('[SIKA] parse error:', e.message);
        showLoadError('sika', 'อ่านข้อมูลจาก Google Sheets ไม่สำเร็จ: ' + e.message);
      }
    })
    .catch(e => {
      sikaLoading = false;
      console.error('[SIKA] fetch error:', e.message);
      showLoadError('sika', 'เชื่อมต่อ Google Sheets ไม่ได้: ' + e.message);
    });
}

  (sikaDataLive.products||[]).forEach(p=>{ const g=p.group; if(!groupTotAmt[g]) return; CY.forEach(y=>{ groupTotAmt[g][y]+=(p.monthly[String(y)]||p.monthly[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0); groupTotQty[g][y]+=(p.bags[String(y)]||p.bags[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0); }); });

  const groupSummaryRows=SIKA_GROUPS.map(g=>{ const col=SIKA_GROUP_COL[g]||'#888'; const cells=CY.map(y=>{ const q=groupTotQty[g][y]||0,v=groupTotAmt[g][y]||0; return `<td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)}">${q>0?fmt(q):'–'}</td><td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)};font-weight:600">${v>0?fmtM(v):'–'}</td>`; }).join(''); const a68=groupTotAmt[g][2568]||0,a69=groupTotAmt[g][lastY]||0; return `<tr style="border-left:3px solid ${col}"><td style="font-weight:700;color:${col}">${g}</td>${cells}<td>${a68&&a69?pctStr(a68,a69):'<span class="pct neutral">–</span>'}</td></tr>`; }).join('');
  const grandAmt=CY.map(y=>fN[y]||0);
  const grandQty=CY.map(y=>(sikaDataLive.products||[]).reduce((s,p)=>s+(p.bags[String(y)]||p.bags[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0),0));
  const grandCells=CY.map((y,i)=>`<td style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700">${grandQty[i]>0?fmt(grandQty[i]):'–'}</td><td style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700">${fmtM(grandAmt[i])}</td>`).join('');
  const grandRow=`<tr class="total-row"><td>รวมทั้งหมด</td>${grandCells}<td>${pctStr(fN[2568],fN[lastY])}</td></tr>`;

  let productSections='';
  SIKA_GROUPS.forEach(g=>{
    const col=SIKA_GROUP_COL[g]||'#888';
    const prods=(sikaDataLive.products||[]).filter(p=>p.group===g);
    if(!prods.length) return;
    const prodRows=prods.map(p=>{ const data=CY.map(y=>({bags:(p.bags[String(y)]||p.bags[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0),amt:(p.monthly[String(y)]||p.monthly[y]||Array(12).fill(0)).slice(0,NM).reduce((a,b)=>a+b,0)})); if(data.every(d=>d.bags===0&&d.amt===0)) return ''; const dataCells=data.map((d,i)=>{ const y=CY[i]; const cls=y===lastY?'yr2569':''; const noData=d.bags===0&&d.amt===0; return `<td class="${cls}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)}">${noData?'<span style="color:#ccc">–</span>':fmt(d.bags)+' '+(p.unit||'หน่วย')}</td><td class="${cls}" style="text-align:right;font-family:var(--mono);font-size:11px;color:${colFor(y)};font-weight:600">${noData?'<span style="color:#ccc">–</span>':fmtM(d.amt)}</td>`; }).join(''); const a68=data.find((_,i)=>CY[i]===2568); const a69=data.find((_,i)=>CY[i]===lastY); return `<tr><td class="prod-name-cell" style="padding-left:14px;font-size:11px">${p.name}</td>${dataCells}<td>${a68&&a69&&a68.amt&&a69.amt?pctStr(a68.amt,a69.amt):'<span class="pct neutral">–</span>'}</td></tr>`; }).filter(Boolean).join('');
    if(!prodRows) return;
    const subCells=CY.map(y=>{ const q=groupTotQty[g][y]||0,v=groupTotAmt[g][y]||0; return `<td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${q>0?fmt(q):'–'}</td><td class="${y===lastY?'yr2569':''}" style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${v>0?fmtM(v):'–'}</td>`; }).join('');
    const sg68=groupTotAmt[g][2568]||0,sg69=groupTotAmt[g][lastY]||0;
    productSections+=`<tr style="background:${col}18"><td colspan="${CY.length*2+2}" style="font-weight:700;color:${col};font-size:12px;padding:8px 12px">▸ ${g}</td></tr>${prodRows}<tr style="background:${col}0d;border-top:1px dashed ${col}60"><td style="padding-left:14px;font-size:11px;color:${col};font-style:italic">รวม${g}</td>${subCells}<td>${sg68&&sg69?pctStr(sg68,sg69):'<span class="pct neutral">–</span>'}</td></tr>`;
  });

  return `
  <div class="page-title">รายการสินค้า ${nmLabel(NM)} (ซิก้าแลงโก้)</div>
  <div class="page-sub">ยอดซื้อ (บาท) และจำนวน เดือน 1–${NM} แยกตามสินค้าและปี</div>
  <div class="chart-wrap"><div class="chart-title">ยอดซื้อรวม ${nmLabel(NM)} รายปี (บาท)</div><div class="chart-legend">${legend}</div><div class="bar-chart">${barsH}</div></div>
  <div class="section-title">เทียบรายเดือน (${nmLabel(NM)})</div>
  <div class="tbl-wrap"><table><thead><tr><th>เดือน</th>${CY.map(y=>`<th class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th>68→69 ⭐</th></tr></thead><tbody>${mRows}</tbody></table></div>
  <div class="section-title">ยอดรวมตามกลุ่มสินค้า (${nmLabel(NM)})</div>
  <div class="tbl-wrap"><table><thead>${groupSummaryHead}</thead><tbody>${groupSummaryRows}${grandRow}</tbody></table></div>
  <div class="section-title">รายละเอียดสินค้า ${nmLabel(NM)} ทุกปี</div>
  <div class="note">จำนวน (ซ้าย) และยอดซื้อบาท (ขวา) เฉพาะเดือน 1–${NM}</div>
  <div class="prod-tbl-wrap"><table>
    <thead><tr><th rowspan="2" style="min-width:160px">สินค้า</th>${CY.map(y=>`<th colspan="2" style="text-align:center;color:${colFor(y)}" class="${y===lastY?'yr2569':''}">${y}</th>`).join('')}<th rowspan="2">68→69</th></tr><tr>${CY.map(()=>`<th style="text-align:right;font-size:10px;color:#888">จำนวน</th><th style="text-align:right;font-size:10px;color:#888">บาท</th>`).join('')}</tr></thead>
    <tbody>${productSections}</tbody>
  </table></div>`;
}

// ══════════════════════════════════════════════
// ── ROUTER & RENDER ENGINE ──
// ══════════════════════════════════════════════
const qcPages = [
  { id:'p0', label:'ภาพรวม',      build: buildPage1 },
  { id:'p1', label:'สินค้า N เดือน', build: buildPage2 },
];
const crocPageDefs = [
  { id:'cp0', label:'ภาพรวม' },
  { id:'cp1', label:'สินค้า N เดือน' },
];
const sikaPageDefs = [
  { id:'sp0', label:'ภาพรวม' },
  { id:'sp1', label:'สินค้า N เดือน' },
];

// อัปเดต label ปุ่ม "สินค้า N เดือน" ให้แสดงเดือนจริง
function updateTabLabel(brand, nm) {
  const MN_SHORT = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const label = `สินค้า ${MN_SHORT[nm-1]}`; // เช่น "สินค้า พ.ค."
  navTabs.querySelectorAll(`.tab-btn[data-brand="${brand}"]`).forEach((btn, i) => {
    if (i === 1) btn.textContent = label;
  });
}

const navTabs     = document.getElementById('navTabs');
const mainContent = document.getElementById('mainContent');

const qcSection   = document.createElement('div'); qcSection.id = 'sectionQC'; mainContent.appendChild(qcSection);
const crocSection = document.createElement('div'); crocSection.id = 'sectionCROC'; crocSection.style.display='none'; mainContent.appendChild(crocSection);
const sikaSection = document.createElement('div'); sikaSection.id = 'sectionSIKA'; sikaSection.style.display='none'; mainContent.appendChild(sikaSection);

let rendered = {};
let currentBrand = 'qc';

// สร้าง DOM elements สำหรับทุก page
qcPages.forEach((pg,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':'');
  btn.textContent = pg.label; btn.dataset.brand='qc';
  btn.onclick=()=>showPage(i,'qc');
  navTabs.appendChild(btn);
  const div = document.createElement('div');
  div.className = 'page'+(i===0?' active':''); div.id = pg.id;
  qcSection.appendChild(div);
});
crocPageDefs.forEach((pg,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':''); btn.style.display='none';
  btn.textContent = pg.label; btn.dataset.brand='croc';
  btn.onclick=()=>showPage(i,'croc');
  navTabs.appendChild(btn);
  const div = document.createElement('div');
  div.className = 'page'+(i===0?' active':''); div.id = pg.id;
  crocSection.appendChild(div);
});
sikaPageDefs.forEach((pg,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':''); btn.style.display='none';
  btn.textContent = pg.label; btn.dataset.brand='sika';
  btn.onclick=()=>showPage(i,'sika');
  navTabs.appendChild(btn);
  const div = document.createElement('div');
  div.className = 'page'+(i===0?' active':''); div.id = pg.id;
  sikaSection.appendChild(div);
});

// ── reRenderAll: เรียกหลัง live data โหลดสำเร็จ ──
function reRenderAll(brand) {
  // ลบ rendered cache ทั้งหมดของ brand นี้
  Object.keys(rendered).forEach(k => { if(k.startsWith(brand+'_')) delete rendered[k]; });
  // re-render เฉพาะ page ที่ active อยู่
  const section = brand==='qc' ? qcSection : brand==='croc' ? crocSection : sikaSection;
  const pages = section.querySelectorAll('.page');
  pages.forEach((div, idx) => {
    if (div.classList.contains('active')) {
      renderPage(brand, idx, div);
    }
  });
  // อัปเดต footer
  const nm = brand==='qc' ? getLastMonth(qcDataLive)
           : brand==='croc' ? (crocData ? getLastMonth({monthlyTotals: parseCrocData().monthlyTotals}) : 5)
           : getLastMonth(sikaDataLive);
  updateFooter(nm);
  updateTabLabel(brand, nm);
}

function renderPage(brand, idx, divEl) {
  const key = `${brand}_${idx}`;
  if (brand === 'qc') {
    divEl.innerHTML = qcPages[idx].build();
  } else if (brand === 'croc') {
    divEl.innerHTML = idx===0 ? buildCrocPage1() : buildCrocPage2();
  } else {
    divEl.innerHTML = idx===0 ? buildSikaPage1() : buildSikaPage2();
  }
  rendered[key] = true;
}

function showPage(idx, brand) {
  const prefix = brand || currentBrand;
  navTabs.querySelectorAll(`.tab-btn[data-brand="${prefix}"]`).forEach((b,i)=>b.classList.toggle('active',i===idx));
  const section = prefix==='qc' ? qcSection : prefix==='croc' ? crocSection : sikaSection;
  section.querySelectorAll('.page').forEach((d,i)=>d.classList.toggle('active',i===idx));

  const key = `${prefix}_${idx}`;
  if (!rendered[key]) {
    const div = section.querySelectorAll('.page')[idx];
    renderPage(prefix, idx, div);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

const SHEET_QC   = 'https://docs.google.com/spreadsheets/d/1aKR6KmUGosext5SE1d92VF-CVEHeCJEFfM_IvHE6gzY/edit?gid=246191077#gid=246191077';
const SHEET_CROC = 'https://docs.google.com/spreadsheets/d/1ru3ctlBD9jaHE62NOUk6Dcdh-tP5cXqzzXhwW0hsjK4/edit?gid=1779795165#gid=1779795165';
const SHEET_SIKA = 'https://docs.google.com/spreadsheets/d/1Rn5wDBvdNDog_gnxZjbQ08dxurWphqrH4u1MENmXLeM/edit?gid=401787243#gid=401787243';

function showBrandLoading(brand) {
  const section = brand==='croc' ? crocSection : sikaSection;
  section.querySelectorAll('.page').forEach(p => {
    if(p.classList.contains('active')) {
      p.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:28px;margin-bottom:12px">⏳</div>
        <div style="font-size:14px;font-weight:600">กำลังโหลดข้อมูล…</div>
      </div>`;
    }
  });
}

function switchBrand(brand) {
  currentBrand = brand;
  document.getElementById('brandQC').classList.toggle('active', brand==='qc');
  document.getElementById('brandCROC').classList.toggle('active', brand==='croc');
  document.getElementById('brandSIKA').classList.toggle('active', brand==='sika');

  const bannerLink = document.getElementById('bannerLink');
  const bannerLabel = document.getElementById('bannerLabel');
  if(brand==='qc'){
    bannerLink.href = SHEET_QC;
    bannerLabel.textContent = '📊 ดูข้อมูลดิบ สินค้าควิกโค้ท ใน Google Sheets';
  } else if(brand==='croc') {
    bannerLink.href = SHEET_CROC;
    bannerLabel.textContent = '📊 ดูข้อมูลดิบ สินค้าจระเข้ ใน Google Sheets';
  } else {
    bannerLink.href = SHEET_SIKA;
    bannerLabel.textContent = '📊 ดูข้อมูลดิบ สินค้าซิก้า ใน Google Sheets';
  }

  if(brand==='qc'){
    qcSection.style.display=''; crocSection.style.display='none'; sikaSection.style.display='none';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='qc' ? '' : 'none'; });
  } else if(brand==='croc') {
    qcSection.style.display='none'; crocSection.style.display=''; sikaSection.style.display='none';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='croc' ? '' : 'none'; });
    loadCrocData();
  } else {
    qcSection.style.display='none'; crocSection.style.display='none'; sikaSection.style.display='';
    navTabs.querySelectorAll('.tab-btn').forEach(b=>{ b.style.display = b.dataset.brand==='sika' ? '' : 'none'; });
    loadSikaData();
  }
}

// ── INIT ──
loadQCData();
showPage(0, 'qc');

</script>
